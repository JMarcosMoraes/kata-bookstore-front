<div class="container">
    <h1>Listando Livros</h1>
    <button routerLink="create" class="mat-elevation-z8" mat-stroked-button color="primary">Novo Livro</button>
    <mat-form-field>
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
    </mat-form-field>
    
    <div class="mat-elevation-z8 print-header">
        <img src="assets/img/logo_M.png" alt="Bookstore">
        <div class="header-text">
            <h2>Bookstore</h2>
            <p>Lista de Livros</p>
        </div>
    </div>

    <div class="mat-elevation-z8 table-wrapper" id="printable-table">
      
        <table mat-table [dataSource]="dataSource">
      
          <ng-container matColumnDef="position">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let element"> {{element.id}} </td>
          </ng-container>
      
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef> Titulo </th>
            <td mat-cell *matCellDef="let element"> {{element.titulo}} </td>
          </ng-container>
       
          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef> Ações </th>
            <td mat-cell *matCellDef="let element">
              <a routerLink="update/{{element.id}}">
                <i class="material-icons edit">edit</i>
              </a>
              <button type="button" class="icon-delete" (click)="delete(element.id)">
                <i class="material-icons delete">delete</i>
              </button>
            </td>
          </ng-container>
      
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      
        <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                       showFirstLastButtons
                       aria-label="Select page of periodic elements">
        </mat-paginator>
      </div>
      <button type="button" mat-flat-button color="accent" class="export-button" (click)="exportPdf()">Exportar PDF</button>
</div>
