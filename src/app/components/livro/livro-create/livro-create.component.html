<div class="container mat-elevation-z8">
    <form class="form">
        <h1>Cadastrar Livro</h1>                     
            <mat-form-field class="fullWidth" appearance="legacy">
                <mat-label>Titulo</mat-label>
                <input 
                    [(ngModel)]="livro.titulo"
                    name="titulo"
                    required
                    [formControl]="titulo"
                    matInput 
                    placeholder="Ex. João Silva"
                    maxlength="40"
                    pattern="^[A-Za-zÀ-ÖØ-öø-ÿ0-9 _-]*$">
                <mat-icon matSuffix>account_balance_wallet</mat-icon>
            </mat-form-field>

            <mat-form-field class="fullWidth" appearance="legacy">
                <mat-label>Editora</mat-label>
                <input 
                    [(ngModel)]="livro.editora"
                    name="editora"
                    required
                    [formControl]="editora"
                    matInput 
                    placeholder="Ex. João Silva"
                    maxlength="40"
                    pattern="^[A-Za-zÀ-ÖØ-öø-ÿ0-9 _-]*$">
                <mat-icon matSuffix>business</mat-icon>
            </mat-form-field>

            <div class="row, fullWidth">
                <mat-form-field class="mediumWidth" appearance="legacy" style="margin-right: 16px;">
                    <mat-label>Edição</mat-label>
                    <input 
                    required
                    type="number"
                    min="1"
                    step="1"
                    [(ngModel)]="livro.edicao"
                    name="edicao"
                    [formControl]="edicao"
                    matInput 
                    placeholder="Ex. 1"
                    maxlength="4">
                    <mat-icon matSuffix>menu_book</mat-icon>
                </mat-form-field>

                <mat-form-field class="mediumWidth" appearance="legacy">
                    <mat-label>Ano de Publicação</mat-label>
                    <input 
                    required
                    type="number"
                    min="1000"
                    max="9999"
                    step="1"
                    [(ngModel)]="livro.anoPublicacao"
                    name="anoPublicacao"
                    [formControl]="anoPublicacao"
                    matInput 
                    placeholder="Ex. 2024"
                    maxlength="4">
                    <mat-icon matSuffix>calendar_today</mat-icon>
                </mat-form-field>
            </div>

            <div class="row, fullWidth">
                <mat-form-field class="mediumWidth" appearance="legacy" style="margin-right: 16px;">
                    <mat-label>Valor</mat-label>
                    <input 
                    required
                    type="number"
                    min="0"
                    step="0.01"
                    [(ngModel)]="livro.valor"
                    name="valor"
                    [formControl]="valor"
                    matInput 
                    placeholder="Ex. 59.90"
                    maxlength="10">
                    <mat-icon matSuffix>attach_money</mat-icon>
                    </mat-form-field>

                <mat-form-field class="mediumWidth" appearance="legacy">
                    <mat-label>Quantidade</mat-label>
                    <input 
                    required
                    type="number"
                    min="0"
                    step="1"
                    [(ngModel)]="livro.quantidade"
                    name="quantidade"
                    [formControl]="quantidade"
                    matInput 
                    placeholder="Ex. 10"
                    maxlength="5">
                    <mat-icon matSuffix>inventory</mat-icon>
                </mat-form-field>
            </div>         

            <mat-form-field class="fullWidth" appearance="legacy">
                <mat-label>Assuntos</mat-label>
                <mat-select [(ngModel)]="livro.assuntos" required name="assuntos" multiple>
                    <mat-option *ngFor="let item of assuntos" [value]="item">
                        {{ item.descricao }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field class="fullWidth" appearance="legacy">
                <mat-label>Autores</mat-label>
                <mat-select [(ngModel)]="livro.autores" required name="autores" multiple>
                    <mat-option *ngFor="let autor of autores" [value]="autor">
                        {{ autor.nome }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <button (click)="create()" class="fullWidth mat-elevation-z4" mat-flat-button color="primary">Cadastrar</button>
            <button routerLink="../" class="fullWidth mat-elevation-z4" mat-stroked-button color="warn">Cancelar</button>
    </form>
    <p class="fullWidth">by José Marcos</p>

</div>
