<div class="container mat-elevation-z8">
    <form class="form">
        <h1>Atualizar Assunto</h1>
        <mat-form-field class="fullWidth" appearance="legacy">
            <mat-label>Descrição</mat-label>
            <input 
                [(ngModel)]="assunto.descricao"
                name="descricao"
                required
                matInput 
                placeholder="Ex. Copa do mundo"
                maxlength="20"
                pattern="^[\\p{L}0-9 ]*$">
            <mat-icon matSuffix>clear_all</mat-icon>
            </mat-form-field>

            <button (click)="update()"  class="fullWidth mat-elevation-z4" mat-flat-button color="primary">Atualizar</button>
            <button routerLink="../../" class="fullWidth mat-elevation-z4" mat-stroked-button color="warn">Cancelar</button>
    </form>
    <p class="fullWidth">by José Marcos</p>

</div>
